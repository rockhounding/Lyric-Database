<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyrics Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Manrope:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Manrope', sans-serif;
      background: #050505;
      color: #EAEAEA;
      min-height: 100vh;
    }
    
    h1, h2, h3 { font-family: 'Playfair Display', serif; }
    
    /* Header */
    header {
      border-bottom: 1px solid #27272A;
      background: rgba(5,5,5,0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .logo svg { color: #D4AF37; }
    
    .logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }
    
    .logo span { color: #D4AF37; }
    
    .btn {
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .btn-primary {
      background: #D4AF37;
      color: #000;
      box-shadow: 0 0 20px rgba(212,175,55,0.2);
    }
    
    .btn-primary:hover { background: #F2C94C; }
    
    .btn-secondary {
      background: #27272A;
      color: #fff;
    }
    
    .btn-secondary:hover { background: #3F3F46; }
    
    .btn-ghost {
      background: transparent;
      color: #A1A1AA;
    }
    
    .btn-ghost:hover { background: #27272A; color: #fff; }
    
    .btn-danger {
      background: #dc2626;
      color: #fff;
    }
    
    .btn-danger:hover { background: #ef4444; }
    
    /* Main */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    /* Category Tabs */
    .tabs {
      display: flex;
      gap: 0.75rem;
      overflow-x: auto;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }
    
    .tabs::-webkit-scrollbar { display: none; }
    
    .tab {
      padding: 0.625rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
      background: #1A1A1A;
      color: #A1A1AA;
      border: 1px solid #27272A;
    }
    
    .tab:hover {
      border-color: rgba(212,175,55,0.5);
      color: #fff;
    }
    
    .tab.active {
      background: #D4AF37;
      color: #000;
      border-color: transparent;
      box-shadow: 0 0 15px rgba(212,175,55,0.3);
    }
    
    /* Songs Grid */
    .songs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    
    .song-card {
      padding: 1.5rem;
      border-radius: 0.75rem;
      border: 1px solid #27272A;
      background: #121212;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }
    
    .song-card:hover {
      border-color: rgba(212,175,55,0.5);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    
    .song-card:hover h3 { color: #D4AF37; }
    
    .song-card h3 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      transition: color 0.3s;
    }
    
    .song-card .preview {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      color: #6B6B6B;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: pre-wrap;
    }
    
    .song-card .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid #27272A;
    }
    
    .category-tag {
      font-size: 0.75rem;
      color: #D4AF37;
      background: rgba(212,175,55,0.1);
      padding: 0.375rem 0.75rem;
      border-radius: 999px;
    }
    
    .delete-btn {
      opacity: 0;
      transition: opacity 0.3s;
      background: transparent;
      border: none;
      color: #6B6B6B;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 0.375rem;
    }
    
    .song-card:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
    }
    
    .empty-state svg {
      color: #27272A;
      margin-bottom: 1rem;
    }
    
    .empty-state h3 {
      font-size: 1.25rem;
      color: #6B6B6B;
      margin-bottom: 0.5rem;
    }
    
    .empty-state p {
      color: #4B4B4B;
      margin-bottom: 1.5rem;
    }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .modal-overlay.open { display: flex; }
    
    .modal {
      background: #0A0A0A;
      border: 1px solid #27272A;
      border-radius: 1rem;
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid #27272A;
    }
    
    .modal-header h2 { font-size: 1.5rem; }
    
    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }
    
    .form-group { margin-bottom: 1.5rem; }
    
    .form-group label {
      display: block;
      font-size: 0.875rem;
      color: #A1A1AA;
      margin-bottom: 0.5rem;
    }
    
    input, textarea, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #1A1A1A;
      border: 1px solid #27272A;
      border-radius: 0.5rem;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
    }
    
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #D4AF37;
    }
    
    .title-input {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      background: transparent;
      border: none;
      padding: 0;
    }
    
    .title-input::placeholder { color: #3F3F46; }
    
    .lyrics-textarea {
      font-family: 'JetBrains Mono', monospace;
      min-height: 300px;
      resize: vertical;
      line-height: 1.8;
      background: transparent;
      border: none;
      padding: 0;
    }
    
    .lyrics-textarea::placeholder { color: #3F3F46; }
    
    .category-row {
      display: flex;
      gap: 0.75rem;
    }
    
    .category-row select { flex: 1; }
    
    #newCategoryInput {
      display: none;
      margin-top: 0.75rem;
    }
    
    #newCategoryInput.show { display: block; }
    
    .modal-footer {
      padding: 1.5rem;
      border-top: 1px solid #27272A;
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      background: #121212;
      border: 1px solid #27272A;
      border-radius: 0.5rem;
      z-index: 300;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
    }
    
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    
    .toast.success { border-color: #22c55e; }
    .toast.error { border-color: #ef4444; }
    
    /* Responsive */
    @media (max-width: 640px) {
      .header-content { padding: 1rem; }
      main { padding: 1rem; }
      .songs-grid { grid-template-columns: 1fr; }
      .modal { max-height: 100vh; border-radius: 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        <h1>Lyrics <span>Studio</span></h1>
      </div>
      <button class="btn btn-primary" onclick="openModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
        </svg>
        New Lyrics
      </button>
    </div>
  </header>

  <main>
    <div class="tabs" id="tabs"></div>
    <div class="songs-grid" id="songsGrid"></div>
    <div class="empty-state" id="emptyState" style="display: none;">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
      <h3>No lyrics yet</h3>
      <p>Start creating your first song lyrics</p>
      <button class="btn btn-primary" onclick="openModal()">Create Lyrics</button>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Create New Lyrics</h2>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <input type="text" id="songTitle" class="title-input" placeholder="Song Title...">
        </div>
        <div class="form-group">
          <textarea id="songLyrics" class="lyrics-textarea" placeholder="Start writing your lyrics..."></textarea>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="categorySelect" onchange="handleCategoryChange()">
            <option value="">Select a category...</option>
            <option value="__new__">+ Create New Category</option>
          </select>
          <input type="text" id="newCategoryInput" placeholder="Enter new category name...">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveSong()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
          </svg>
          Save Lyrics
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // State
    let songs = JSON.parse(localStorage.getItem('lyrics-studio-songs') || '[]');
    let categories = [...new Set(songs.map(s => s.category).filter(Boolean))];
    let activeCategory = 'All';
    let editingId = null;

    // Save to localStorage
    function saveToStorage() {
      localStorage.setItem('lyrics-studio-songs', JSON.stringify(songs));
      categories = [...new Set(songs.map(s => s.category).filter(Boolean))];
    }

    // Show toast
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Render tabs
    function renderTabs() {
      const tabsContainer = document.getElementById('tabs');
      const allTabs = ['All', ...categories];
      tabsContainer.innerHTML = allTabs.map(cat => `
        <button class="tab ${activeCategory === cat ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</button>
      `).join('');
    }

    // Render songs
    function renderSongs() {
      const grid = document.getElementById('songsGrid');
      const emptyState = document.getElementById('emptyState');
      
      const filtered = activeCategory === 'All' 
        ? songs 
        : songs.filter(s => s.category === activeCategory);
      
      if (filtered.length === 0) {
        grid.style.display = 'none';
        emptyState.style.display = 'block';
        emptyState.querySelector('h3').textContent = activeCategory === 'All' 
          ? 'No lyrics yet' 
          : `No lyrics in "${activeCategory}"`;
      } else {
        grid.style.display = 'grid';
        emptyState.style.display = 'none';
        grid.innerHTML = filtered.map(song => `
          <div class="song-card" onclick="editSong('${song.id}')">
            <h3>${escapeHtml(song.title)}</h3>
            <p class="preview">${escapeHtml(song.lyrics)}</p>
            <div class="footer">
              <span class="category-tag">${escapeHtml(song.category)}</span>
              <button class="delete-btn" onclick="deleteSong(event, '${song.id}')" title="Delete">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
              </button>
            </div>
          </div>
        `).join('');
      }
    }

    // Update category dropdown
    function updateCategoryDropdown() {
      const select = document.getElementById('categorySelect');
      select.innerHTML = `
        <option value="">Select a category...</option>
        ${categories.map(cat => `<option value="${cat}">${cat}</option>`).join('')}
        <option value="__new__">+ Create New Category</option>
      `;
    }

    // Set active category
    function setCategory(cat) {
      activeCategory = cat;
      renderTabs();
      renderSongs();
    }

    // Handle category select change
    function handleCategoryChange() {
      const select = document.getElementById('categorySelect');
      const newInput = document.getElementById('newCategoryInput');
      if (select.value === '__new__') {
        newInput.classList.add('show');
        newInput.focus();
      } else {
        newInput.classList.remove('show');
        newInput.value = '';
      }
    }

    // Open modal
    function openModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Create New Lyrics';
      document.getElementById('songTitle').value = '';
      document.getElementById('songLyrics').value = '';
      document.getElementById('categorySelect').value = '';
      document.getElementById('newCategoryInput').value = '';
      document.getElementById('newCategoryInput').classList.remove('show');
      updateCategoryDropdown();
      document.getElementById('modalOverlay').classList.add('open');
    }

    // Edit song
    function editSong(id) {
      const song = songs.find(s => s.id === id);
      if (!song) return;
      
      editingId = id;
      document.getElementById('modalTitle').textContent = 'Edit Lyrics';
      document.getElementById('songTitle').value = song.title;
      document.getElementById('songLyrics').value = song.lyrics;
      updateCategoryDropdown();
      document.getElementById('categorySelect').value = song.category;
      document.getElementById('newCategoryInput').classList.remove('show');
      document.getElementById('modalOverlay').classList.add('open');
    }

    // Close modal
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function closeModalOnOverlay(e) {
      if (e.target.id === 'modalOverlay') closeModal();
    }

    // Save song
    function saveSong() {
      const title = document.getElementById('songTitle').value.trim();
      const lyrics = document.getElementById('songLyrics').value.trim();
      const categorySelect = document.getElementById('categorySelect').value;
      const newCategory = document.getElementById('newCategoryInput').value.trim();
      
      if (!title) { showToast('Please enter a title', 'error'); return; }
      if (!lyrics) { showToast('Please enter lyrics', 'error'); return; }
      
      let category = categorySelect === '__new__' ? newCategory : categorySelect;
      if (!category) { showToast('Please select or create a category', 'error'); return; }

      if (editingId) {
        const index = songs.findIndex(s => s.id === editingId);
        if (index !== -1) {
          songs[index] = { ...songs[index], title, lyrics, category, updatedAt: Date.now() };
        }
        showToast('Lyrics updated!');
      } else {
        songs.unshift({
          id: Date.now().toString(),
          title,
          lyrics,
          category,
          createdAt: Date.now()
        });
        showToast('Lyrics saved!');
      }

      saveToStorage();
      renderTabs();
      renderSongs();
      closeModal();
    }

    // Delete song
    function deleteSong(e, id) {
      e.stopPropagation();
      if (!confirm('Delete this song? This cannot be undone.')) return;
      songs = songs.filter(s => s.id !== id);
      saveToStorage();
      renderTabs();
      renderSongs();
      showToast('Lyrics deleted!');
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Init
    renderTabs();
    renderSongs();
  </script>
</body>
</html>
